name: Crypto Twitter Monitor Bot

on:
  schedule:
    - cron: '*/15 * * * *' # اجرای خودکار هر ۱۵ دقیقه یک‌بار
  workflow_dispatch: # امکان اجرای دستی از تب Actions

jobs:
  run-bot:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Repository
      uses: actions/checkout@v3

    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.11'

    - name: Cache Sent Links File
      uses: actions/cache@v3
      with:
        path: sent_links.txt
        key: sent-links-cache-${{ github.run_id }}
        restore-keys: |
          sent-links-cache-

    - name: Install Dependencies
      run: |
        python -m pip install --upgrade pip
        pip install python-telegram-bot==20.8

    - name: Run Bot Script
      env:
        TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
        TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
      run: python bot.py

    - name: Save Updated Cache
      if: always()
      run: echo "Cache updated successfully."
