name: Twitter RSS Telegram Bot

on:
  schedule:
    # این دستور یعنی کد هر 15 دقیقه یک‌بار اجرا شود
    - cron: '*/15 * * * *'
  workflow_dispatch: # این خط به شما اجازه می‌دهد خودتان هم دستی دکمه Run را بزنید

jobs:
  run-bot:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Repository
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'

    # بازیابی فایل متنی لینک‌های ارسال شده از اجراهای قبلی (جلوگیری از تکرار)
    - name: Restore Sent Links Cache
      uses: actions/cache@v4
      with:
        path: sent_links.txt
        key: sent-links-${{ github.run_id }}
        restore-keys: |
          sent-links-

    - name: Install Dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt

    - name: Run Bot
      env:
        TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
        TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
      run: python bot.py

    # ذخیره مجدد فایل متنی لینک‌ها برای اجرای بعدی
    - name: Save Sent Links Cache
      if: always()
      uses: actions/cache/save@v4
      with:
        path: sent_links.txt
        key: sent-links-${{ github.run_id }}
