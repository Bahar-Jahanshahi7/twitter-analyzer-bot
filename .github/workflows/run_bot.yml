name: Crypto Twitter Monitor Bot

on:
  schedule:
    - cron: '*/5 * * * *' # هر 5 دقیقه یک‌بار اجرا می‌شود
  workflow_dispatch: # امکان اجرای دستی

jobs:
  run-bot:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Repository
      uses: actions/checkout@v3

    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.11'

    - name: Install Dependencies
      run: pip install python-telegram-bot==20.8

    - name: Run Bot Script
      env:
        TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
        TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
      run: python bot.py # مطمئن شو نام فایل پایتونت دقیقاً همین است

    - name: Commit and Push Changes
      run: |
        git config --global user.name "GitHub Action Bot"
        git config --global user.email "actions@github.com"
        git add sent_links.txt
        git diff --quiet && git diff --staged --quiet || (git commit -m "🔄 Update sent_links.txt [skip ci]" && git push)
