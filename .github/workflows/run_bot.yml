name: Crypto Twitter Monitor Bot

on:
  schedule:
    - cron: '*/15 * * * *' # اجرای خودکار هر ۱۵ دقیقه یک‌بار بدون محدودیت ریل‌وی
  workflow_dispatch: # دکمه اجرای دستی

jobs:
  run-bot:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout Repository
      uses: actions/checkout@v3

    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.11'

    - name: Install Dependencies
      run: pip install python-telegram-bot==20.8

    - name: Run Bot Script
      run: python bot.py
